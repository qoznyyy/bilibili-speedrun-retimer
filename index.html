<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bilibili Speedrun Retimer & Downloader</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #111; color: #eee; text-align: center; margin: 0; padding: 20px; }
        #player-container { margin: 20px auto; max-width: 850px; background: #000; border-radius: 8px; box-shadow: 0 10px 30px rgba(0,0,0,0.7); overflow: hidden; }
        video { width: 100%; display: block; }
        .panel { background: #222; padding: 20px; margin-top: 10px; border-radius: 8px; border: 1px solid #333; max-width: 850px; margin-left: auto; margin-right: auto; }
        .controls-row { margin-bottom: 15px; display: flex; justify-content: center; align-items: center; gap: 10px; flex-wrap: wrap; }
        button { padding: 10px 16px; cursor: pointer; background: #444; color: white; border: none; border-radius: 4px; font-weight: bold; transition: 0.2s; }
        button:hover { background: #555; }
        .btn-primary { background: #007bff; }
        .btn-primary:hover { background: #0056b3; }
        .btn-download { background: #e91e63; }
        .btn-download:hover { background: #c2185b; }
        input { padding: 10px; background: #111; color: white; border: 1px solid #444; border-radius: 4px; }
        .result-box { font-size: 32px; color: #00ff88; margin: 15px 0; font-family: 'Courier New', monospace; font-weight: bold; }
        .file-label { padding: 10px 16px; background: #28a745; border-radius: 4px; cursor: pointer; font-weight: bold; }
        input[type="file"] { display: none; }
        .hint { font-size: 13px; color: #888; margin-top: 10px; line-height: 1.5; }
    </style>
</head>
<body>

    <h2>Speedrun Retimer & Downloader</h2>

    <div class="controls-row">
        <input id="url" placeholder="Paste Bilibili link (BV...)" size="40">
        <button class="btn-primary" onclick="loadVideo()">Load Link</button>
        <span>OR</span>
        <label class="file-label">
            📁 Open Local Video
            <input type="file" accept="video/*" onchange="handleFile(this)">
        </label>
    </div>

    <div id="player-container">
        <video id="video" controls crossorigin="anonymous"></video>
    </div>

    <div class="panel">
        <div class="controls-row">
            FPS: <input id="fps" type="number" value="60" style="width: 60px;">
            <button class="btn-download" onclick="downloadVideo()">⬇️ Download Video</button>
        </div>
        
        <div class="controls-row">
            <button onclick="setStart()">Set Start (A)</button>
            <button onclick="setEnd()">Set End (E)</button>
        </div>

        <div class="controls-row">
            <button onclick="step(-1)">◀ Frame (,)</button>
            <button onclick="step(1)">Frame ▶ (.)</button>
        </div>

        <div style="border-top: 1px solid #444; padding-top: 15px;">
            Start: <span id="start">-</span>s
