<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Speedrun Retimer + Proxy Bypass</title>
    <style>
        body { font-family: 'Segoe UI', Arial; background: #111; color: #eee; text-align: center; padding: 20px; }
        #player-container { margin: 20px auto; max-width: 850px; background: #000; border-radius: 8px; overflow: hidden; }
        video { width: 100%; display: block; }
        .panel { background: #222; padding: 20px; border-radius: 8px; border: 1px solid #333; max-width: 850px; margin: 10px auto; }
        .controls-row { margin-bottom: 15px; display: flex; justify-content: center; align-items: center; gap: 10px; flex-wrap: wrap; }
        button { padding: 10px 16px; cursor: pointer; background: #444; color: white; border: none; border-radius: 4px; font-weight: bold; }
        button:hover { background: #555; }
        .btn-primary { background: #007bff; }
        .btn-download { background: #e91e63; }
        input { padding: 10px; background: #111; color: white; border: 1px solid #444; border-radius: 4px; }
        .result-box { font-size: 32px; color: #00ff88; font-family: monospace; font-weight: bold; margin: 10px; }
        .proxy-toggle { background: #331111; padding: 8px; border-radius: 4px; border: 1px solid #662222; font-size: 13px; }
    </style>
</head>
<body>

    <h2>Speedrun Retimer & Proxy Bypass</h2>

    <div class="controls-row">
        <input id="url" placeholder="Bilibili BV link..." size="35">
        <button class="btn-primary" onclick="loadVideo()">Load Link</button>
        
        <div class="proxy-toggle">
            <input type="checkbox" id="useProxy"> 
            <label for="useProxy">Force CORS Proxy (Slow)</label>
        </div>
    </div>

    <div id="player-container">
        <video id="video" controls crossorigin="anonymous"></video>
    </div>

    <div class="panel">
        <div class="controls-row">
            FPS: <input id="fps" type="number" value="60" style="width: 60px;">
            <button class="btn-download" onclick="downloadVideo()">⬇️ Download</button>
        </div>
        
        <div class="controls-row">
            <button onclick="setStart()">Set Start (A)</button>
            <button onclick="setEnd()">Set End (E)</button>
            <button onclick="step(-1)">◀ Frame (,)</button>
            <button onclick="step(1)">Frame ▶ (.)</button>
        </div>

        <div style="border-top: 1px solid #444; padding-top: 15px;">
            <div id="result-time" class="result-box">0.000s</div>
            <div id="result-frames" style="color: #888;">0 frames</div>
            <br>
            <button onclick="copyResult()">Copy Result</button>
        </div>
    </div>

<script>
    const video = document.getElementById("video");
    let startTime = null;
    let endTime = null;

    async function loadVideo() {
        const urlInput = document.getElementById("url").value.trim();
        const useProxy = document.getElementById("useProxy").checked;
        const match = urlInput.match(/BV\w+/);
        
        if (!match) return;

        try {
            const res = await fetch(`https://bilibili-speedrun-retimer.marko-looke.workers.dev/?bvid=${match[0]}`);
            const data = await res.json();
            
            if (data.url) {
                let finalUrl = data.url;
                
                // --- THE PROXY METHOD ---
                // If checked, we wrap the URL in a CORS-anywhere style proxy
                if (useProxy) {
                    finalUrl = `https://corsproxy.io/?${encodeURIComponent(finalUrl)}`;
                }
                
                video.src = finalUrl;
                video.load();
            }
        } catch (e) {
            alert("API error. Try checking 'Force CORS Proxy' and clicking Load again.");
        }
    }

    // Standard Retiming Functions
    function getFps() { return parseFloat(document.getElementById("fps").value) || 60; }
    function step(dir) { video.pause(); video.currentTime += (1 / getFps()) * dir; }
    function setStart() { startTime = video.currentTime; update(); }
    function setEnd() { endTime = video.currentTime; update(); }
    
    function update() {
        if (startTime !== null && endTime !== null) {
            const diff = Math.abs(endTime - startTime);
            document.getElementById("result-time").innerText = diff.toFixed(3) + "s";
            document.getElementById("result-frames").innerText = Math.round(diff * getFps()) + " frames";
        }
    }

    function downloadVideo() { window.open(video.src, '_blank'); }

    function copyResult() {
        const text = `${document.getElementById("result-time").innerText} (${document.getElementById("result-frames").innerText})`;
        navigator.clipboard.writeText(text);
        alert("Copied!");
    }

    document.addEventListener("keydown", e => {
        if (e.target.tagName === 'INPUT') return;
        if (e.key.toLowerCase() === "a") setStart();
        if (e.key.toLowerCase() === "e") setEnd();
        if (e.key === ",") step(-1);
        if (e.key === ".") step(1);
    });
</script>
</body>
</html>
