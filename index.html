<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Speedrun Retimer (Bilibili + YouTube)</title>
    <style>
        body { font-family: 'Segoe UI', Arial; background: #111; color: #eee; text-align: center; padding: 20px; }
        
        /* Fixed Player Container */
        #player-wrapper { 
            margin: 20px auto; 
            max-width: 850px; 
            background: #000; 
            border-radius: 8px; 
            overflow: hidden; 
            position: relative; 
            aspect-ratio: 16 / 9; /* Ensures container has height */
        }

        #video-element, #yt-player { 
            position: absolute;
            top: 0;
            left: 0;
            width: 100%; 
            height: 100%; 
            display: block; 
            border: none; 
        }

        .panel { background: #222; padding: 20px; border-radius: 8px; border: 1px solid #333; max-width: 850px; margin: 10px auto; }
        .controls-row { margin-bottom: 15px; display: flex; justify-content: center; align-items: center; gap: 10px; flex-wrap: wrap; }
        button { padding: 10px 16px; cursor: pointer; background: #444; color: white; border: none; border-radius: 4px; font-weight: bold; }
        button:hover { background: #555; }
        .btn-primary { background: #007bff; }
        input { padding: 10px; background: #111; color: white; border: 1px solid #444; border-radius: 4px; }
        .result-box { font-size: 32px; color: #00ff88; font-family: monospace; font-weight: bold; margin: 10px; }
        .proxy-toggle { background: #331111; padding: 8px; border-radius: 4px; border: 1px solid #662222; font-size: 13px; }
        
        .hidden { visibility: hidden; pointer-events: none; }
    </style>
    <script src="https://www.youtube.com/iframe_api"></script>
</head>
<body>

    <h2>Speedrun Retimer</h2>

    <div class="controls-row">
        <input id="url" placeholder="Paste Bilibili or YouTube link..." size="45">
        <button class="btn-primary" onclick="handleLoad()">Load Video</button>
        
        <div class="proxy-toggle">
            <input type="checkbox" id="useProxy"> 
            <label for="useProxy">CORS Proxy (Bilibili Only)</label>
        </div>
    </div>

    <div id="player-wrapper">
        <video id="video-element" controls crossorigin="anonymous"></video>
        <div id="yt-player"></div>
    </div>

    <div class="panel">
        <div class="controls-row">
            FPS: <input id="fps" type="number" value="60" step="0.001" style="width: 80px;">
        </div>
        
        <div class="controls-row">
            <button onclick="setStart()">Set Start (A)</button>
            <button onclick="setEnd()">Set End (E)</button>
            <button onclick="step(-1)">◀ Frame (,)</button>
            <button onclick="step(1)">Frame ▶ (.)</button>
        </div>

        <div style="border-top: 1px solid #444; padding-top: 15px;">
            <div id="points-display" style="color:#aaa; font-size:14px;">Start: -- | End: --</div>
            <div id="result-time" class="result-box">0.000s</div>
            <div id="result-frames" style="color: #888;">0 frames</div>
            <br>
            <button onclick="copyResult()">Copy Result</button>
        </div>
    </div>

<script>
    let ytPlayer;
    let activePlayer = 'native'; 
    let startTime = null, endTime = null;

    const nativeVid = document.getElementById("video-element");
    const ytIframeContainer = document.getElementById("yt-player");

    // Initialize YT Player
    function onYouTubeIframeAPIReady() {
        ytPlayer = new YT.Player('yt-player', {
            height: '100%',
            width: '100%',
            videoId: '', // Start empty
            playerVars: { 
                'autoplay': 0,
                'controls': 1,
                'rel': 0,
                'origin': window.location.origin
            },
            events: {
                'onReady': () => {
                    // Start with YT container hidden until a YT link is loaded
                    ytIframeContainer.classList.add('hidden');
                }
            }
        });
    }

    function getCurrentTime() {
        if (activePlayer === 'youtube' && ytPlayer && ytPlayer.getCurrentTime) {
            return ytPlayer.getCurrentTime();
        }
        return nativeVid.currentTime;
    }

    function seekTo(time) {
        if (activePlayer === 'youtube') {
            ytPlayer.seekTo(time, true);
        } else {
            nativeVid.currentTime = time;
        }
    }

    async function handleLoad() {
        const url = document.getElementById("url").value.trim();
        const ytMatch = url.match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|embed\/|v\/|shorts\/))([\w-]{11})/);
        const biliMatch = url.match(/BV\w+/);

        if (ytMatch) {
            loadYoutube(ytMatch[1]);
        } else if (biliMatch) {
            loadBilibili(biliMatch[0]);
        } else {
            alert("Please enter a valid Bilibili BV link or YouTube link.");
        }
    }

    function loadYoutube(id) {
        activePlayer = 'youtube';
        nativeVid.classList.add('hidden');
        nativeVid.pause();
        
        ytIframeContainer.classList.remove('hidden');
        ytPlayer.loadVideoById(id);
        resetData();
    }

    async function loadBilibili(bvid) {
        activePlayer = 'native';
        ytIframeContainer.classList.add('hidden');
        if(ytPlayer && ytPlayer.pauseVideo) ytPlayer.pauseVideo();
        
        nativeVid.classList.remove('hidden');
        
        const useProxy = document.getElementById("useProxy").checked;
        try {
            const res = await fetch(`https://bilibili-speedrun-retimer.marko-looke.workers.dev/?bvid=${bvid}`);
            const data = await res.json();
            if (data.url) {
                let finalUrl = data.url;
                if (useProxy) finalUrl = `https://corsproxy.io/?${encodeURIComponent(finalUrl)}`;
                nativeVid.src = finalUrl;
                nativeVid.load();
                resetData();
            }
        } catch (e) { 
            alert("Bilibili API Error. Try toggling the proxy."); 
        }
    }

    function resetData() {
        startTime = null; 
        endTime = null; 
        update();
    }

    function getFps() { 
        return parseFloat(document.getElementById("fps").value) || 60; 
    }

    function step(dir) {
        // Stop playback before stepping
        if (activePlayer === 'youtube') ytPlayer.pauseVideo();
        else nativeVid.pause();

        const newTime = getCurrentTime() + (1 / getFps()) * dir;
        seekTo(newTime);
    }

    function setStart() { startTime = getCurrentTime(); update(); }
    function setEnd() { endTime = getCurrentTime(); update(); }

    function update() {
        const startTxt = startTime !== null ? startTime.toFixed(3) : "--";
        const endTxt = endTime !== null ? endTime.toFixed(3) : "--";
        document.getElementById("points-display").innerText = `Start: ${startTxt}s | End: ${endTxt}s`;

        if (startTime !== null && endTime !== null) {
            const diff = Math.abs(endTime - startTime);
            document.getElementById("result-time").innerText = diff.toFixed(3) + "s";
            document.getElementById("result-frames").innerText = Math.round(diff * getFps()) + " frames";
        } else {
            document.getElementById("result-time").innerText = "0.000s";
            document.getElementById("result-frames").innerText = "0 frames";
        }
    }

    function copyResult() {
        const time = document.getElementById("result-time").innerText;
        const frames = document.getElementById("result-frames").innerText;
        const text = `${time} (${frames})`;
        navigator.clipboard.writeText(text).then(() => alert("Copied result!"));
    }

    document.addEventListener("keydown", e => {
        if (e.target.tagName === 'INPUT') return;
        const key = e.key.toLowerCase();
        if (key === "a") setStart();
        if (key === "e") setEnd();
        if (key === ",") step(-1);
        if (key === ".") step(1);
    });
</script>
</body>
</html>
