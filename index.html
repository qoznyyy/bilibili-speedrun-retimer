<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bilibili Speedrun Retimer (Frame Count Edition)</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #111; color: #eee; text-align: center; margin: 0; padding: 20px; }
        #player-container { margin: 20px auto; max-width: 850px; background: #000; border-radius: 8px; box-shadow: 0 10px 30px rgba(0,0,0,0.7); overflow: hidden; }
        video { width: 100%; display: block; }
        .panel { background: #222; padding: 20px; margin-top: 10px; border-radius: 8px; border: 1px solid #333; max-width: 850px; margin-left: auto; margin-right: auto; }
        .controls-row { margin-bottom: 15px; display: flex; justify-content: center; align-items: center; gap: 10px; flex-wrap: wrap; }
        button { padding: 10px 16px; cursor: pointer; background: #444; color: white; border: none; border-radius: 4px; font-weight: bold; transition: 0.2s; }
        button:hover { background: #555; }
        .btn-primary { background: #007bff; }
        .btn-primary:hover { background: #0056b3; }
        .btn-download { background: #e91e63; }
        .btn-download:hover { background: #c2185b; }
        input { padding: 10px; background: #111; color: white; border: 1px solid #444; border-radius: 4px; }
        
        .results-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin: 20px 0; padding: 15px; background: #1a1a1a; border-radius: 6px; }
        .result-item { text-align: center; }
        .label { font-size: 14px; color: #aaa; text-transform: uppercase; margin-bottom: 5px; }
        .value { font-size: 32px; color: #00ff88; font-family: 'Courier New', monospace; font-weight: bold; }
        
        .file-label { padding: 10px 16px; background: #28a745; border-radius: 4px; cursor: pointer; font-weight: bold; }
        input[type="file"] { display: none; }
        .hint { font-size: 13px; color: #888; margin-top: 15px; line-height: 1.5; }
        .current-pos { font-size: 14px; color: #00bcd4; margin-bottom: 10px; }
    </style>
</head>
<body>

    <h2>Speedrun Retimer & Downloader</h2>

    <div class="controls-row">
        <input id="url" placeholder="Paste Bilibili link (BV...)" size="40">
        <button class="btn-primary" onclick="loadVideo()">Load Link</button>
        <span>OR</span>
        <label class="file-label">
            📁 Open Local Video
            <input type="file" accept="video/*" onchange="handleFile(this)">
        </label>
    </div>

    <div id="player-container">
        <video id="video" controls crossorigin="anonymous" ontimeupdate="updateCurrentPos()"></video>
    </div>

    <div class="panel">
        <div class="current-pos">Current Frame: <span id="curFrame">0</span> | Time: <span id="curTime">0.000</span>s</div>
        
        <div class="controls-row">
            FPS: <input id="fps" type="number" value="60" style="width: 70px;" onchange="update()">
            <button class="btn-download" onclick="downloadVideo()">⬇️ Download Video</button>
        </div>
        
        <div class="controls-row">
            <button onclick="setStart()">Set Start (A)</button>
            <button onclick="setEnd()">Set End (E)</button>
        </div>

        <div class="controls-row">
            <button onclick="step(-1)">◀ Frame (,)</button>
            <button onclick="step(1)">Frame ▶ (.)</button>
        </div>

        <div class="results-grid">
            <div class="result-item">
                <div class="label">Total Time</div>
                <div id="result-time" class="value">0.000s</div>
            </div>
            <div class="result-item">
                <div class="label">Total Frames</div>
                <div id="result-frames" class="value">0</div>
            </div>
        </div>

        <div>
            <span style="color: #888">Start: <span id="start">-</span>s | End: <span id="end">-</span>s</span><br><br>
            <button onclick="copyResult()">Copy Formatted Result</button>
        </div>
        
        <div class="hint">
            <b>Shortcuts:</b> [A] Start | [E] End | [ , ] Prev Frame | [ . ] Next Frame<br>
            <i>Formula: $Time = Frames / FPS$</i>
        </div>
    </div>

<script>
    const video = document.getElementById("video");
    let startTime = null;
    let endTime = null;

    // --- LOADING LOGIC ---
    async function loadVideo() {
        const urlInput = document.getElementById("url").value.trim();
        const match = urlInput.match(/BV\w+/);
        if (!match) { video.src = urlInput; return; }

        try {
            const res = await fetch(`https://bilibili-speedrun-retimer.marko-looke.workers.dev/?bvid=${match[0]}`);
            const data = await res.json();
            if (data.url) { video.src = data.url; video.load(); }
        } catch (e) { alert("API Error. The proxy might be down."); }
    }

    function handleFile(input) {
        const file = input.files[0];
        if (file) {
            video.src = URL.createObjectURL(file);
            video.load();
            resetMarkers();
        }
    }

    function downloadVideo() {
        if (!video.src || video.src.startsWith('blob:')) {
            alert(video.src.startsWith('blob:') ? "This is a local file!" : "Load a video first!");
            return;
        }
        alert("Redirecting to stream. If it doesn't download, Right-Click -> Save Video As.");
        window.open(video.src, '_blank');
    }

    // --- RETIMING LOGIC ---
    function getFps() { return parseFloat(document.getElementById("fps").value) || 60; }

    function updateCurrentPos() {
        document.getElementById("curTime").innerText = video.currentTime.toFixed(3);
        document.getElementById("curFrame").innerText = Math.floor(video.currentTime * getFps());
    }

    function step(dir) {
        video.pause();
        video.currentTime += (1 / getFps()) * dir;
    }

    function setStart() {
        startTime = video.currentTime;
        document.getElementById("start").innerText = startTime.toFixed(3);
        update();
    }

    function setEnd() {
        endTime = video.currentTime;
        document.getElementById("end").innerText = endTime.toFixed(3);
        update();
    }

    function update() {
        if (startTime !== null && endTime !== null) {
            const fps = getFps();
            const timeDiff = Math.abs(endTime - startTime);
            const frameDiff = Math.round(timeDiff * fps);
            
            document.getElementById("result-time").innerText = timeDiff.toFixed(3) + "s";
            document.getElementById("result-frames").innerText = frameDiff;
        }
    }

    function resetMarkers() {
        startTime = null; endTime = null;
        document.getElementById("start").innerText = "-";
        document.getElementById("end").innerText = "-";
        document.getElementById("result-time").innerText = "0.000s";
        document.getElementById("result-frames").innerText = "0";
    }

    function copyResult() {
        const time = document.getElementById("result-time").innerText;
        const frames = document.getElementById("result-frames").innerText;
        const fps = document.getElementById("fps").value;
        const text = `Time: ${time} (${frames} frames @ ${fps} fps)`;
        navigator.clipboard.writeText(text);
        alert("Copied to clipboard!");
    }

    document.addEventListener("keydown", e => {
        if (e.target.tagName === 'INPUT') return;
        const key = e.key.toLowerCase();
        if (key === "a") setStart();
        if (key === "e") setEnd();
        if (key === ",") step(-1);
        if (key === ".") step(1);
    });
</script>

</body>
</html>
