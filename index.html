<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GTA Series Verification Queue</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: #e0e0e0; padding: 20px; }
        h1 { color: #f39c12; text-align: center; }
        .controls { text-align: center; margin-bottom: 20px; }
        button { background: #f39c12; border: none; padding: 10px 20px; cursor: pointer; font-weight: bold; border-radius: 5px; }
        button:disabled { background: #555; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: #1e1e1e; }
        th, td { padding: 12px; border: 1px solid #333; text-align: left; }
        th { background: #2c3e50; }
        tr:hover { background: #252525; }
        .loading { text-align: center; font-style: italic; color: #aaa; }
        a { color: #3498db; text-decoration: none; }
        a:hover { text-decoration: underline; }
        .badge { background: #444; padding: 2px 6px; border-radius: 4px; font-size: 0.8em; margin-right: 5px; }
    </style>
</head>
<body>

    <h1>GTA Series Verification Queue</h1>
    
    <div class="controls">
        <button id="refreshBtn">Refresh All GTA Queues</button>
        <p id="status"></p>
    </div>

    <table id="queueTable">
        <thead>
            <tr>
                <th>Game</th>
                <th>Category</th>
                <th>Player</th>
                <th>Time</th>
                <th>Submitted</th>
                <th>Link</th>
            </tr>
        </thead>
        <tbody id="queueBody">
            </tbody>
    </table>

    <script>
        // List of GTA game abbreviations on speedrun.com
        const gtaGames = [
            'gta1', 'gta_london_1969', 'gta_london_1961', 'gta2', 
            'gta_iii', 'gtavc', 'gtasa', 'gtalcs', 'gtavcs', 
            'gtaiv', 'gtaiv_tlad', 'gtaiv_tbogt', 'gtacw', 'gtav', 'gta_v_ce'
        ];

        const refreshBtn = document.getElementById('refreshBtn');
        const queueBody = document.getElementById('queueBody');
        const statusText = document.getElementById('status');

        async function fetchQueue() {
            refreshBtn.disabled = true;
            queueBody.innerHTML = '';
            statusText.innerText = "Fetching games...";
            
            let allRuns = [];

            for (const abbreviation of gtaGames) {
                statusText.innerText = `Fetching ${abbreviation}...`;
                try {
                    // 1. Get Game ID and Name
                    const gameRes = await fetch(`https://www.speedrun.com/api/v1/games/${abbreviation}`);
                    const gameData = await gameRes.json();
                    const gameId = gameData.data.id;
                    const gameName = gameData.data.names.international;

                    // 2. Get Pending Runs for this Game
                    const runRes = await fetch(`https://www.speedrun.com/api/v1/runs?game=${gameId}&status=new&max=200&embed=category,players`);
                    const runData = await runRes.json();

                    runData.data.forEach(run => {
                        allRuns.push({
                            game: gameName,
                            category: run.category.data.name,
                            player: run.players.data[0].names ? run.players.data[0].names.international : run.players.data[0].name,
                            time: formatTime(run.times.primary_t),
                            submitted: new Date(run.submitted),
                            link: run.weblink
                        });
                    });
                } catch (e) {
                    console.error(`Error fetching ${abbreviation}:`, e);
                }
            }

            // Sort by submission date (oldest first)
            allRuns.sort((a, b) => a.submitted - b.submitted);

            // Render to table
            if (allRuns.length === 0) {
                queueBody.innerHTML = '<tr><td colspan="6" style="text-align:center;">No pending runs found!</td></tr>';
            } else {
                allRuns.forEach(run => {
                    const row = `<tr>
                        <td><span class="badge">${run.game}</span></td>
                        <td>${run.category}</td>
                        <td>${run.player}</td>
                        <td>${run.time}</td>
                        <td>${run.submitted.toLocaleDateString()}</td>
                        <td><a href="${run.link}" target="_blank">View</a></td>
                    </tr>`;
                    queueBody.innerHTML += row;
                });
            }

            statusText.innerText = `Done! Found ${allRuns.length} pending runs.`;
            refreshBtn.disabled = false;
        }

        function formatTime(seconds) {
            const h = Math.floor(seconds / 3600);
            const m = Math.floor((seconds % 3600) / 60);
            const s = Math.floor(seconds % 60);
            return [h, m, s].map(v => v < 10 ? "0" + v : v).filter((v,i) => v !== "00" || i > 0).join(":");
        }

        refreshBtn.addEventListener('click', fetchQueue);
        
        // Initial load
        fetchQueue();
    </script>
</body>
</html>
