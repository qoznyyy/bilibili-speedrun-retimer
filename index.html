<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Speedrun Retimer + Proxy Bypass</title>
    <style>
        body { font-family: 'Segoe UI', Arial; background: #111; color: #eee; text-align: center; padding: 20px; }
        #player-container { margin: 20px auto; max-width: 850px; background: #000; border-radius: 8px; overflow: hidden; }
        video { width: 100%; display: block; }
        .panel { background: #222; padding: 20px; border-radius: 8px; border: 1px solid #333; max-width: 850px; margin: 10px auto; }
        .controls-row { margin-bottom: 15px; display: flex; justify-content: center; align-items: center; gap: 10px; flex-wrap: wrap; }
        button { padding: 10px 16px; cursor: pointer; background: #444; color: white; border: none; border-radius: 4px; font-weight: bold; }
        button:hover { background: #555; }
        .btn-primary { background: #007bff; }
        input { padding: 10px; background: #111; color: white; border: 1px solid #444; border-radius: 4px; }
        .result-box { font-size: 32px; color: #00ff88; font-family: monospace; font-weight: bold; margin: 10px; }
        .proxy-toggle { background: #331111; padding: 8px; border-radius: 4px; border: 1px solid #662222; font-size: 13px; }
        .timestamp-label { font-size: 14px; color: #aaa; margin-bottom: 5px; }
    </style>
</head>
<body>

    <h2>Speedrun Retimer</h2>

    <div class="controls-row">
        <input id="url" placeholder="Bilibili BV link..." size="35">
        <button class="btn-primary" onclick="loadVideo()">Load Link</button>
        
        <div class="proxy-toggle">
            <input type="checkbox" id="useProxy"> 
            <label for="useProxy">Force CORS Proxy (Slow)</label>
        </div>
    </div>

    <div id="player-container">
        <video id="video" controls crossorigin="anonymous"></video>
    </div>

    <div class="panel">
        <div class="controls-row">
            FPS: <input id="fps" type="number" value="60" step="0.001" style="width: 80px;">
        </div>
        
        <div class="controls-row">
            <button onclick="setStart()">Set Start (A)</button>
            <button onclick="setEnd()">Set End (E)</button>
            <button onclick="step(-1)">◀ Frame (,)</button>
            <button onclick="step(1)">Frame ▶ (.)</button>
        </div>

        <div style="border-top: 1px solid #444; padding-top: 15px;">
            <div class="timestamp-label" id="points-display">Start: -- | End: --</div>
            <div id="result-time" class="result-box">0.000s</div>
            <div id="result-frames" style="color: #888;">0 frames</div>
            <br>
            <button onclick="copyResult()">Copy Result</button>
        </div>
    </div>

<script>
    const video = document.getElementById("video");
    let startTime = null;
    let endTime = null;

    async function loadVideo() {
        const urlInput = document.getElementById("url").value.trim();
        const useProxy = document.getElementById("useProxy").checked;
        const match = urlInput.match(/BV\w+/);
        
        if (!match) {
            alert("Please enter a valid Bilibili BV link.");
            return;
        }

        try {
            const res = await fetch(`https://bilibili-speedrun-retimer.marko-looke.workers.dev/?bvid=${match[0]}`);
            const data = await res.json();
            
            if (data.url) {
                let finalUrl = data.url;
                if (useProxy) {
                    finalUrl = `https://corsproxy.io/?${encodeURIComponent(finalUrl)}`;
                }
                video.src = finalUrl;
                video.load();
                // Reset times on new video load
                startTime = null;
                endTime = null;
                update();
            }
        } catch (e) {
            alert("API error. Try checking 'Force CORS Proxy' or verify the link.");
        }
    }

    function getFps() { 
        return parseFloat(document.getElementById("fps").value) || 60; 
    }

    function step(dir) { 
        video.pause(); 
        // Small epsilon added to ensure the frame actually changes
        video.currentTime += (1 / getFps()) * dir + (dir * 0.00001); 
    }

    function setStart() { 
        startTime = video.currentTime; 
        update(); 
    }

    function setEnd() { 
        endTime = video.currentTime; 
        update(); 
    }
    
    function update() {
        const pointsDisplay = document.getElementById("points-display");
        const startTxt = startTime !== null ? startTime.toFixed(3) : "--";
        const endTxt = endTime !== null ? endTime.toFixed(3) : "--";
        pointsDisplay.innerText = `Start: ${startTxt}s | End: ${endTxt}s`;

        if (startTime !== null && endTime !== null) {
            const diff = Math.abs(endTime - startTime);
            const fps = getFps();
            document.getElementById("result-time").innerText = diff.toFixed(3) + "s";
            document.getElementById("result-frames").innerText = Math.round(diff * fps) + " frames";
        } else {
            document.getElementById("result-time").innerText = "0.000s";
            document.getElementById("result-frames").innerText = "0 frames";
        }
    }

    function copyResult() {
        const time = document.getElementById("result-time").innerText;
        const frames = document.getElementById("result-frames").innerText;
        if (time === "0.000s") return;
        
        const text = `${time} (${frames})`;
        navigator.clipboard.writeText(text).then(() => alert("Copied: " + text));
    }

    document.addEventListener("keydown", e => {
        if (e.target.tagName === 'INPUT') return;
        const key = e.key.toLowerCase();
        if (key === "a") setStart();
        if (key === "e") setEnd();
        if (key === ",") step(-1);
        if (key === ".") step(1);
    });
</script>
</body>
</html>
